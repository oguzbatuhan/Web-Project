      crossorigin="anonymous"

    />
    <link

      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"

    />

  </head>
  <body>
    <header class="">
      <nav
        class="navbar bg-dark border-bottom border-bady navbar-expand-lg"
        data-bs-theme="dark"
      >
        <div class="container">
          <a href="index.html" class="navbar-brand">Admin Panel</a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarContent"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a href="kategori.html" class="nav-link">Kategori</a>
              </li>
              <li class="nav-item">
                <a href="urun.html" class="nav-link">Ürünler</a>
              </li>
              <li class="nav-item">
                <a href="slider.html" class="nav-link active">Slider</a>
              </li>
              <li class="nav-item">

              </li>
              <li class="nav-item">
                <a href="kullanicilar.html" class="nav-link">Kullanıcılar</a>
              </li>
              <li class="nav-item">
                <a href="siparisler.html" class="nav-link">Siparişler</a>
              </li>
            </ul>
            <ul class="navbar-nav mb-2 mb-lg-0">
              <li class="nav-item dropdown">
                <a
                  href="#"
                  class="nav-link dropdown-toggle"
                  data-bs-toggle="dropdown"
                  >Oğuz Batuhan</a
                >
                <ul class="dropdown-menu">
                  <li><a href="#" class="dropdown-item">Hesabım</a></li>
                  <li><a href="#" class="dropdown-item">Çıkış</a></li>
                </ul>
              </li>
              <li class="nav-item">
                <a href="login.html" class="nav-link">Giriş</a>
              </li>
              <li class="nav-item">
                <a href="register.html" class="nav-link">Hesap Oluştur</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="container my-3">
      <div class="row">
        <div class="col">
          <div class="card shadow">
            <div
              class="card-header py-1 d-flex justify-content-between align-item-center"
            >
              <h5 class="card-title">Slider Ekle</h5>
              <a href="slider.html" class="btn btn-sm btn-primary">
                <i class="fa-solid fa-list"></i>
              </a>
            </div>
            <div class="card-body">
              <form>
                <div class="row mb-3">
                  <label for="kategoriAdi" class="col-sm-2 col-form-label"
                    >Mevcut Resim</label
                  >
                  <div class="col-sm-10">
                    <img src="img/slider-1.jpeg" class="img-fluid rounded" />
                  </div>
                </div>
                <div class="row mb-3">
                  <label for="sliderBaşlik" class="col-sm-2 col-form-label"
                    >Başlık</label
                  >
                  <div class="col-sm-10">
                    <input type="text" id="sliderBaşlik" class="form-control" />
                  </div>
                </div>
                <div class="row mb-3">
                  <label for="sliderAçiklama" class="col-sm-2 col-form-label"
                    >Açıklama</label
                  >
                  <div class="col-sm-10">
                    <textarea
                      id="sliderAçiklama"
                      class="form-control"
                      rows="3"
                    ></textarea>
                  </div>
                </div>
                <div class="row mb-3">
                  <label for="img" class="col-sm-2 col-form-label">Resim</label>
                  <div class="col-sm-10">
                    <input type="file" id="img" class="form-control" />
                  </div>
                </div>
                <div class="row mb-3">
                  <label for="index" class="col-sm-2 col-form-label"
                    >İndex</label
                  >
                  <div class="col-sm-10">
                    <input type="number" id="index" class="form-control" />
                  </div>
                </div>
                <div class="row mb-3">
                  <label for="aktif" class="col-sm-2 col-form-label"
                    >Aktif</label
                  >
                  <div class="col-sm-10">
                    <input
                      type="checkbox"
                      id="aktif"
                      class="form-check-input"
                    />
                  </div>
                </div>
                <div class="row mb-3">
                  <div class="offset-sm-2">
                    <button type="submit" class="btn btn-primary">
                      Kaydet
                    </button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"
      integrity="sha512-7Pi/otdlbbCR+LnW+F7PwFcSDJOuUJB3OxtEHbg4vSMvzvJjde4Po1v4BR9Gdc9aXNUNFVUY+SK51wWT8WF0Gg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
  </body>
