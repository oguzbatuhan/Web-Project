<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Kullanıcı Ekle</title>
  </head>
  <body>
    <header class="">
      <nav
        class="navbar bg-dark border-bottom border-bady navbar-expand-lg"
        data-bs-theme="dark"
      >
        <div class="container">
          <a href="index.html" class="navbar-brand">Admin Panel</a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarContent"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a href="kategori.html" class="nav-link">Kategori</a>
              </li>
              <li class="nav-item">
                <a href="urun.html" class="nav-link">Ürünler</a>
              </li>
              <li class="nav-item">
                <a href="slider.html" class="nav-link">Slider</a>
              </li>
              <li class="nav-item">
                <a href="role.html" class="nav-link">Role</a>
              </li>
              <li class="nav-item">
                <a href="kullanicilar.html" class="nav-link active"
                  >Kullanıcılar</a
                >
              </li>
              <li class="nav-item">
                <a href="siparisler.html" class="nav-link">Siparişler</a>
              </li>
            </ul>
            <ul class="navbar-nav mb-2 mb-lg-0">
              <li class="nav-item dropdown">
                <a
                  href="#"
                  class="nav-link dropdown-toggle"
                  data-bs-toggle="dropdown"
                  >Oğuz Batuhan</a
                >
                <ul class="dropdown-menu">
                  <li><a href="#" class="dropdown-item">Hesabım</a></li>
                  <li><a href="#" class="dropdown-item">Çıkış</a></li>
                </ul>
              </li>
              <li class="nav-item">
                <a href="login.html" class="nav-link">Giriş</a>
              </li>
              <li class="nav-item">
                <a href="register.html" class="nav-link">Hesap Oluştur</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="container my-3">
      <div class="row">
        <div class="col-md-3">
          <div class="card shadow">
            <div class="card-body">
              <img src="img/user.png" class="img-thumbnail" />
              <input type="file" class="form-control mt-3" />
            </div>
          </div>
          <div class="card shadow mt-3">
            <div class="card-body">
              <div class="form-check">
                <input type="checkbox" id="role1" class="form-check-input" />
                <label for="role1" class="form-check-label">Admin</label>
              </div>
              <div class="form-check">
                <input
                  type="checkbox"
                  id="role2"
                  class="form-check-input"
                  checked
                />
                <label for="role2" class="form-check-label">Supplier</label>
              </div>
              <div class="form-check">
                <input type="checkbox" id="role3" class="form-check-input" />
                <label for="role3" class="form-check-label">Customer</label>
              </div>
            </div>
          </div>
        </div>
        <div class="col-md-9 mt-3 mt-md-0">
          <div class="card shadow">
            <div
              class="card-header py-1 d-flex justify-content-between align-item-center"
            >
              <h5 class="card-title">Kullanıcı Ekle</h5>
              <a href="kullanicilar.html" class="btn btn-sm btn-primary">
                <i class="fa-solid fa-list"></i>
              </a>
            </div>
            <div class="card-body">
              <form>
                <div class="row mb-3">
                  <label for="username" class="col-sm-2 col-form-label"
                    >Userame</label
                  >
                  <div class="col-sm-10">
                    <input type="text" id="username" class="form-control" />
                  </div>
                </div>
                <div class="row mb-3">
                  <label for="adiSoyadi" class="col-sm-2 col-form-label"
                    >Adı Soyadı</label
                  >
                  <div class="col-sm-10">
                    <input type="text" id="adisoyadi" class="form-control" />
                  </div>
                </div>
                <div class="row mb-3">
                  <label for="eposta" class="col-sm-2 col-form-label"
                    >E-posta</label
                  >
                  <div class="col-sm-10">
                    <input type="email" id="eposta" class="form-control" />
                  </div>
                </div>
                <div class="row mb-3">
                  <label for="onay" class="col-sm-2 col-form-label">Onay</label>
                  <div class="col-sm-10">
                    <input type="checkbox" id="onay" class="form-check-input" />
                  </div>
                </div>
                <div class="row mb-3">
                  <div class="offset-sm-2">
                    <button type="submit" class="btn btn-primary">
                      Kaydet
                    </button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"
      integrity="sha512-7Pi/otdlbbCR+LnW+F7PwFcSDJOuUJB3OxtEHbg4vSMvzvJjde4Po1v4BR9Gdc9aXNUNFVUY+SK51wWT8WF0Gg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
  </body>
</html>
