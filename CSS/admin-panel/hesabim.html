    <link

  </head>

      <nav
        class="navbar bg-dark border-bottom border-bady navbar-expand-lg"

          <a href="index.html" class="navbar-brand">Admin Panel</a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarContent"

            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a href="kategori.html" class="nav-link">Kategori</a>

              <li class="nav-item">

              </li>
              <li class="nav-item">
                <a href="role.html" class="nav-link">Role</a>
              </li>
              <li class="nav-item">
                <a href="kullanicilar.html" class="nav-link">Kullanıcılar</a>
              </li>
              <li class="nav-item">
                <a href="siparisler.html" class="nav-link">Siparişler</a>
              </li>
            </ul>
            <ul class="navbar-nav mb-2 mb-lg-0">
              <li class="nav-item dropdown">

                <ul class="dropdown-menu">
                  <li>

                      >Hesabım</a

                  </li>

              <li class="nav-item">
                <a href="login.html" class="nav-link">Giriş</a>

              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="container my-3 wh-100">
      <div class="row">
        <div class="col-md-3">
          <div class="card shadow">
            <div class="card-body">
              <img src="img/user.png" class="img-thumbnail" />
              <input type="file" class="form-control mt-3" />
            </div>
          </div>
        </div>
        <div class="col-md-9">
          <div class="card shadow mb-3">
            <div class="card-header py-1">
              <h5 class="card-title">Kullanıcı Bilgileri</h5>
            </div>
            <div class="card-body">
              <form>
                <div class="row mb-3">
                  <label for="username" class="col-sm-2 col-form-label"
                    >Username</label
                  >
                  <div class="col-sm-10">
                    <input
                      type="text"
                      id="username"
                      class="form-control"
                      disabled
                    />
                  </div>
                </div>

                <div class="row mb-3">
                  <label for="adSoyad" class="col-sm-2 col-form-label"
                    >Ad Soyad</label
                  >
                  <div class="col-sm-10">
                    <input type="text" id="adSoyad" class="form-control" />
                  </div>
                </div>
                <div class="row mb-3">
                  <label for="email" class="col-sm-2 col-form-label"
                    >E-posta</label
                  >
                  <div class="col-sm-10">
                    <input type="email" id="email" class="form-control" />
                  </div>
                </div>
                <button type="submit" class="btn btn-primary offset-sm-2">
                  Güncelle
                </button>
              </form>
            </div>
          </div>

          <div class="card shadow">
            <div class="card-header py-1">
              <h5 class="card-title">Parola Güncelle</h5>
            </div>
            <div class="card-body">
              <form>
                <div class="row mb-3">
                  <label for="password" class="col-sm-2 col-form-label"
                    >Parola</label
                  >
                  <div class="col-sm-10">
                    <input type="password" id="password" class="form-control" />
                  </div>
                </div>
                <div class="row mb-3">
                  <label for="password" class="col-sm-2 col-form-label"
                    >Parola Tekrar</label
                  >
                  <div class="col-sm-10">
                    <input type="password" id="password" class="form-control" />
                  </div>
                </div>
                <button type="submit" class="btn btn-primary offset-sm-2">
                  Güncelle
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"
      integrity="sha512-7Pi/otdlbbCR+LnW+F7PwFcSDJOuUJB3OxtEHbg4vSMvzvJjde4Po1v4BR9Gdc9aXNUNFVUY+SK51wWT8WF0Gg=="

      referrerpolicy="no-referrer"
    ></script>
